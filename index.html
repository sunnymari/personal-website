<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>✨ Marissa's Kawaii Website ✨</title>

    <!-- If your site is not at the web root, use "style.css" (no leading slash) -->
    <link href="/style.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Roboto+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&family=Fredoka+One&display=swap" rel="stylesheet">
    <script type="module" src="/src/global-cursor.js"></script>
  </head>
  <body class="homepage">
    <div class="island-home">
      <div class="sky-layer" aria-hidden="true">
        <span class="sky-cloud cloud-a"></span>
        <span class="sky-cloud cloud-b"></span>
        <span class="sky-cloud cloud-c"></span>
        <span class="sky-hill hill-a"></span>
        <span class="sky-hill hill-b"></span>
        <span class="sky-spark spark-a">✦</span>
        <span class="sky-spark spark-b">✧</span>
        <span class="sky-spark spark-c">✦</span>
      </div>
      <section class="island-world" aria-label="Dreamy kawaii island scene">
        <div id="meshy-room-root"></div>
        <script type="module" src="/src/meshy-room-main.jsx"></script>
      </section>

      <header class="island-topbar">
        <span class="island-chip">marissa island</span>
        <span class="island-chip">cozy dev life</span>
        <span class="island-chip">kawaii world</span>
      </header>

      <div class="island-search" role="search" aria-label="Site search">
        <span class="island-search-icon">🔎</span>
        <input type="text" placeholder="Spotlight Search" aria-label="Spotlight Search" />
      </div>

      <section class="island-hero-section">
        <h1 class="hero-title island-title">
          <span class="char">W</span><span class="char">e</span><span class="char">l</span><span class="char">c</span><span class="char">o</span><span class="char">m</span><span class="char">e</span><span class="char"> </span><span class="char">T</span><span class="char">o</span><span class="char"> </span><span class="char">M</span><span class="char">y</span><span class="char"> </span><span class="char">I</span><span class="char">s</span><span class="char">l</span><span class="char">a</span><span class="char">n</span><span class="char">d</span>
        </h1>
        <p class="island-subtitle">Dreamy code, cozy stories, magical projects</p>
      </section>

      <nav class="nav-buttons island-nav">
        <a href="/about" class="nav-link nav-toy-card"><span class="toy-icon">🌸</span><span class="toy-label">About</span></a>
        <a href="/projects" class="nav-link nav-toy-card"><span class="toy-icon">🎀</span><span class="toy-label">Projects</span></a>
        <a href="/reading" class="nav-link nav-toy-card"><span class="toy-icon">📖</span><span class="toy-label">Reading</span></a>
        <a href="/work-with-me" class="nav-link nav-toy-card"><span class="toy-icon">💌</span><span class="toy-label">Work With Me</span></a>
        <a href="/blog" class="nav-link nav-toy-card"><span class="toy-icon">📝</span><span class="toy-label">Blog</span></a>
        <a href="/pageant" class="nav-link nav-toy-card"><span class="toy-icon">🎮</span><span class="toy-label">Pageant Sim</span></a>
        <a href="/chibi" class="nav-link nav-toy-card"><span class="toy-icon">🏠</span><span class="toy-label">Dollhouse</span></a>
      </nav>

      <footer class="island-bottombar">
        <span>marissa codes ✨ island edition</span>
      </footer>
      <div class="world-stickers" aria-hidden="true">
        <span class="sticker sticker-heart">💗</span>
        <span class="sticker sticker-fruit">🍓</span>
        <span class="sticker sticker-star">⭐</span>
      </div>
    </div>

    <!-- Ko-fi floating chat -->
    <script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
    <script>
      kofiWidgetOverlay.draw('F1F811AMXE', {
        type: 'floating-chat',
        'floating-chat.donateButton.text': 'Support me',
        'floating-chat.donateButton.background-color': '#ff38b8',
        'floating-chat.donateButton.text-color': '#fff'
      });
    </script>
  </body>
</html>
